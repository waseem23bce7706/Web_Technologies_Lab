<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 1 - Form Validation</title>
    <script src="react.production.min.js"></script>
    <script src="react-dom.production.min.js"></script>
    <script src="babel.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4f8; padding: 20px; }
        .form-container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            background: #1e40af;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .error { color: red; font-size: 0.9rem; margin: 5px 0; }
        .success { color: green; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function UserForm() {
            const [formData, setFormData] = React.useState({
                name: '',
                email: '',
                password: ''
            });
            const [errors, setErrors] = React.useState({});
            const [submitted, setSubmitted] = React.useState(false);

            const handleChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
                // Clear error when user starts typing
                if (errors[name]) {
                    setErrors({ ...errors, [name]: '' });
                }
            };

            const validate = () => {
                let newErrors = {};
                if (!formData.name.trim()) newErrors.name = "Name is required";
                if (!formData.email.trim()) {
                    newErrors.email = "Email is required";
                } else if (!/\S+@\S+\.\S+/.test(formData.email)) {
                    newErrors.email = "Invalid email format";
                }
                if (!formData.password.trim()) {
                    newErrors.password = "Password is required";
                } else if (formData.password.length < 6) {
                    newErrors.password = "Password must be at least 6 characters";
                }
                setErrors(newErrors);
                return Object.keys(newErrors).length === 0;
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (validate()) {
                    alert("Form submitted successfully!\nName: " + formData.name + "\nEmail: " + formData.email);
                    setSubmitted(true);
                    // Reset form after successful submission
                    setFormData({ name: '', email: '', password: '' });
                    setErrors({});
                }
            };

            return (
                <div className="form-container">
                    <h1 style={{textAlign: "center", color: "#1e40af"}}>User Registration Form</h1>
                    <form onSubmit={handleSubmit}>
                        <div>
                            <input 
                                type="text" 
                                name="name" 
                                placeholder="Full Name" 
                                value={formData.name} 
                                onChange={handleChange} 
                            />
                            {errors.name && <div className="error">{errors.name}</div>}
                        </div>

                        <div>
                            <input 
                                type="email" 
                                name="email" 
                                placeholder="Email Address" 
                                value={formData.email} 
                                onChange={handleChange} 
                            />
                            {errors.email && <div className="error">{errors.email}</div>}
                        </div>

                        <div>
                            <input 
                                type="password" 
                                name="password" 
                                placeholder="Password" 
                                value={formData.password} 
                                onChange={handleChange} 
                            />
                            {errors.password && <div className="error">{errors.password}</div>}
                        </div>

                        <button type="submit">Submit</button>
                    </form>

                    {submitted && <div className="success">✅ Form submitted successfully! Fields have been reset.</div>}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<UserForm />);
    </script>
</body>
</html>
